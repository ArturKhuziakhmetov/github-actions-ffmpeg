# git commit -am "dev" && git push -qf && gh workflow run test-install.yml
name: Test Install
run-name: apt-fast with cache
on: workflow_dispatch
jobs:
  job:
    runs-on: ubuntu-latest
    steps:

      - name: Cache /var/cache/apt/apt-fast
        uses: actions/cache@v3
        with:
          path: /var/cache/apt
          key: cache-apt

      - name: Install programs
        run: |
          # ./install-ubuntu.sh
          sig="/usr/share/keyrings/gpg-pub-moritzbunkus.gpg"
          sudo curl -so $sig "https://mkvtoolnix.download/gpg-pub-moritzbunkus.gpg"
          sudo tee "/etc/apt/sources.list.d/mkvtoolnix.download.list" <<< \
          "deb [signed-by=$sig] https://mkvtoolnix.download/ubuntu $(lsb_release -cs) main"
          # sudo add-apt-repository ppa:savoury1/graphics
          # sudo add-apt-repository ppa:savoury1/multimedia
          echo ::group::add-apt-repository
          sudo add-apt-repository ppa:savoury1/ffmpeg4
          sudo add-apt-repository ppa:savoury1/ffmpeg5
          echo ::endgroup::
          sudo apt-fast update -qy
          sudo apt-fast install -qy mkvtoolnix ffmpeg

      - name: Program versions
        run: |
          # Versions
          mkvmerge -V
          ffmpeg -version
          apt-fast --help
          man apt-fast
