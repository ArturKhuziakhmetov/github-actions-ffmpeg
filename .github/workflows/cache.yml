# git commit -am "dev" && git push -qf && gh workflow run cache.yml -F urls=@urls -F xxh=@xxh

name: Cache input
on:
  workflow_dispatch:
    inputs:
      urls:
        required: true
        type: string
      xxh:
        required: true
        type: string
jobs:
  job:
    runs-on: ubuntu-latest
    steps:

      - name: Download input
        run: curl -Z --create-dirs --output-dir input -K - <<< "${{ inputs.urls }}"

      - name: Check input
        run: |
          stat -c "%10s  %n" input/*
          xxhsum -c <<< ${{ inputs.xxh }}

      - name: Cache save input
        if: always()
        uses: actions/cache/save@v3
        with:
          path: input
          key: input-005
