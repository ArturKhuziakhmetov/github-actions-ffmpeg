# git commit -am "dev" && git push -qf && gh workflow run cache.yml -F urls=@urls1 -F sums=@sums1 -f cache=plichta-1

name: Create cache
run-name: ${{ inputs.cache }}
on:
  workflow_dispatch:
    inputs:
      urls:
        required: true
      sums:
        required: true
      cache:
        required: true
jobs:
  caching:
    runs-on: ubuntu-latest
    steps:

      - name: Download
        run: |
          xargs curl -Z --create-dirs --output-dir input << "EOF"
          ${{ inputs.urls }}EOF

      - name: List files
        run: |
          cd input && ls -Qs1

      - name: Check sums
        run: |
          b2sum -c << "EOF"
          ${{ inputs.sums }}EOF

      - name: Save cache
        uses: actions/cache/save@v3
        with:
          path: input
          key: ${{ inputs.cache }}
