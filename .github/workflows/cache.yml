# git commit -am. && git push -qf && gh workflow run cache.yml -f id=be2f142e-6380-9601-0eff-b44f8fd99aea -F sums=@sums

name: Fight 1.e4 like Caruana
run-name: ${{ inputs.id }}
on:
  workflow_dispatch:
    inputs:
      id:
        required: true
      sums:
        required: true
jobs:
  create-cache:
    runs-on: ubuntu-latest
    steps:

      - name: Download
        run: |
          # Download
          curl -qZJ --remote-name-all --create-dirs --output-dir input \
          $(curl --referer https://www.sendbig.com \
          --header 'Content-Type: application/json' \
          --data '{identifier:"${{ inputs.id }}"}' \
          https://s1.sendbig.com/api/Archive/viewArchive | \
          jq -j '.data.files | sort_by(.fileSize) | reverse[] |
          "https://\(.serverIdentifier).sendbig.com/api/Files/download/\(.id)/${{ inputs.id }}/20138 "')

      - name: List files
        working-directory: input
        run: |
          ls -Qs1

      - name: Check sums
        run: |
          b2sum -c << "EOF"
          ${{ inputs.sums }}EOF

      - name: Save cache
        uses: actions/cache/save@v3
        with:
          path: input
          key: ${{ inputs.id }}
          enableCrossOsArchive: true

