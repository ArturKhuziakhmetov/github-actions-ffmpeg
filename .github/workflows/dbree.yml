# git commit -am. && git push -qf && gh workflow run dbree.yml -f title="Nimzo-Semi-Tarrasch-1-2" -F urls=@urls.txt -f use-urls=true

name: dbree
run-name: ${{ inputs.title }}
on:
  workflow_dispatch:
    inputs:
      title:
        required: true
      use-url:
        type: boolean
      url:
        required: false
      num:
        required: false
      use-urls:
        type: boolean
      urls:
        required: false

jobs:
  all:
    runs-on: ubuntu-latest
    steps:

      - name: Preparing
        run: |
          sudo add-apt-repository ppa:savoury1/utilities > /dev/null && \
          sudo apt-fast -yqq install curl 7zip > /dev/null &
          pip install -q selenium
          cat << "EOF" | tee test.py
          import time
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          chrome_options = Options()
          chrome_options.add_argument("--headless")
          driver = webdriver.Chrome(options=chrome_options)
          driver.get("https://dbree.org/v/381638")
          time.sleep(10)
          print(";".join(f'{d["name"]}={d["value"]}' for d in driver.get_cookies()))
          EOF

      - name: Get links from url
        if: ${{ inputs.use-url }}
        run: |
          c=$(python3 test.py)
          u='${{ inputs.url }}'
          for n in {0..${{ inputs.num }}..10}; do
              echo ::group::Page: $n
              curl -sb $c "${u%0}$n" | grep -om1 "/v/[^']*" | \
              while read id; do
                  curl -sb $c -w 'url = %{redirect_url}\n' \
                    https:$(curl -sb $c https://dbree.org$id | \
                            grep -om1 "//dbree.org/d/[^']*" || exit 1)
              done | tee -a urls
              echo ::endgroup::
          done

      - name: Get links from urls
        if: ${{ inputs.use-urls }}
        run: |
          c=$(python3 test.py)
          while read id; do
              curl -sb $c -w 'url = %{redirect_url}\n' \
                https:$(curl -sb $c https://dbree.org$id | \
                        grep -om1 "//dbree.org/d/[^']*" || exit 1)
          done << "EOF" | tee -a urls
          ${{ inputs.urls }}EOF

      - name: Preparing download
        run: |
          mkdir zip
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache &
          curl -s https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz | tar xz &

      - name: Download
        working-directory: zip
        run: curl -JOZkf --remote-name-all --no-clobber --fail-early --remove-on-error --parallel-max 10 -K ../urls -w 'Downloaded bytes %{size_download}\nAverage speed %{speed_download} bytes/sec.\nTotal time %{time_total} secs.\n'

      - name: Extracting
        working-directory: zip
        run: |
          ls -Qs1
          7zz e -bb3 *001
          for file in *.7z; do
              7zz l "$file"
              7zz l -slt "$file"
          done
          ls -Qs1

      - name: Ngrok
        run: |
          ./ngrok http --authtoken ${{ secrets.NGROK_AUTHTOKEN }} --log ngrok.log file://$PWD/zip &
          cat ngrok.log
          wait


