# git commit -am. && git push -qf && gh workflow run dbree.yml -f title="Nimzo-Semi-Tarrasch-1-2" -f url="https://dbree.org/s/l%20nimzo%20part%201%202&page=0" -f num=78

name: dbree
run-name: ${{ inputs.title }}
on:
  workflow_dispatch:
    inputs:
      title:
        required: true
      url:
        required: true
      num:
        required: true
jobs:
  all:
    runs-on: ubuntu-latest
    steps:
      - name: Disk space report before
        run: free; swapon --show; df -h

      - name: Removing unneeded files
        run: |
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/hostedtoolcache &
          wait

      - name: Disk space report after
        run: free; swapon --show; df -h

      - name: Install software
        run: |
          pip install -q selenium
          sudo add-apt-repository ppa:savoury1/utilities > /dev/null
          sudo apt-fast -yqq install curl 7zip > /dev/null
          curl -V | head -1
          7zz | head -2

      - name: Create script
        run: |
          cat << "EOF" | tee test.py
          import time
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          chrome_options = Options()
          chrome_options.add_argument("--headless")
          driver = webdriver.Chrome(options=chrome_options)
          driver.get("https://dbree.org/v/381638")
          time.sleep(10)
          print(";".join(f'{d["name"]}={d["value"]}'
                for d in driver.get_cookies()))
          EOF

      - name: Get links
        run: |
          u='${{ inputs.url }}'
          c=$(python3 test.py)
          for n in {0..${{ inputs.num }}..10}; do
              echo ::group::Page: $n
              curl -sb $c "${u%0}$n" | grep -om1 "/v/[^']*" | \
              while read id; do
                  curl -sb $c -w 'url = %{redirect_url}\n' \
                    https:$(curl -sb $c https://dbree.org$id | \
                            grep -om1 "//dbree.org/d/[^']*" || exit 1)
              done | tee -a urls
              echo ::endgroup::
          done
          mkdir zip

      - name: Download
        working-directory: zip
        run: curl -JOZk --remote-name-all --no-clobber --parallel-max 100 -K ../urls

      - name: List zip files
        working-directory: zip
        run: ls -Qs1

      - name: List files in archive
        working-directory: zip
        run: for file in *.001; do 7zz l "$file"; done

      - name: List files in archive verbose
        working-directory: zip
        run: for file in *.001; do 7zz l -slt "$file"; done

      - name: Extracting
        run: 7z e -bb3 -ozip2 zip/*001

      - name: List files in archive 2
        working-directory: zip2
        run: for file in *.7z; do 7zz l "$file"; done

      - name: List files in archive verbose 2
        working-directory: zip2
        run: for file in *.7z; do 7zz l -slt "$file"; done

      - name: Removing zip
        run: rm -rf zip

      - name: Extracting 2
        run: 7z e -bb3 -oinput zip2/*.7z

      - name: List extracted files
        working-directory: input
        run: ls -Qs1

      - name: Removing zip2
        run: rm -rf zip2

      - name: Save cache
        uses: actions/cache/save@v3
        with:
          path: input
          key: ${{ inputs.title }}
          enableCrossOsArchive: true

