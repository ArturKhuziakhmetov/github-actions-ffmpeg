name: dbree
run-name: ${{ inputs.title }}
on:
  workflow_dispatch:
    inputs:
      title:
        required: true
      url:
        required: true
      num:
        required: true
jobs:
  all:
    runs-on: ubuntu-latest
    steps:
      # - name: Disk space report before
      #   run: free; swapon --show; df -h

      - name: Install software
        run: |
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache &
          sudo add-apt-repository ppa:savoury1/utilities > /dev/null && \
          sudo apt-fast -yqq install curl 7zip > /dev/null &
          sudo snap install ngrok &
          pip install -q selenium

      - name: Create script
        run: |
          cat << "EOF" | tee test.py
          import time
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          chrome_options = Options()
          chrome_options.add_argument("--headless")
          driver = webdriver.Chrome(options=chrome_options)
          driver.get("https://dbree.org/v/381638")
          time.sleep(10)
          print(";".join(f'{d["name"]}={d["value"]}'
                for d in driver.get_cookies()))
          EOF

      - name: Get links
        run: |
          u='${{ inputs.url }}'
          c=$(python3 test.py)
          for n in {0..${{ inputs.num }}..10}; do
              echo ::group::Page: $n
              curl -sb $c "${u%0}$n" | grep -om1 "/v/[^']*" | \
              while read id; do
                  curl -sb $c -w 'url = %{redirect_url}\n' \
                    https:$(curl -sb $c https://dbree.org$id | \
                            grep -om1 "//dbree.org/d/[^']*" || exit 1)
              done | tee -a urls
              echo ::endgroup::
          done
          mkdir zip

      - name: Download
        working-directory: zip
        run: curl -JOZk --remote-name-all --no-clobber --parallel-max 100 -K ../urls

      - name: Extracting
        working-directory: zip
        run: |
          ls -Qs1
          7zz e -bb3 *001
          for file in *.7z; do
              7zz l "$file"
              7zz l -slt "$file"
          done
          ls -Qs1

      - name: Ngrok
        run: |
          ngrok http --authtoken ${{ secrets.NGROK_AUTHTOKEN }} --log ngrok.log file://$PWD/zip &
          cat ngrok.log
          while :; do sleep 1; done


