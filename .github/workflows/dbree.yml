# git commit -am. && git push -qf && gh workflow run dbree.yml -f title="Stop-Em-Cold" -f url="https://dbree.org/s/chessable%20stop&page=0" -f num=18

name: dbree
run-name: ${{ inputs.title }}
on:
  workflow_dispatch:
    inputs:
      title:
        required: true
      url:
        required: true
      num:
        required: true
jobs:
  all:
    runs-on: ubuntu-latest
    steps:

      - name: Install
        run: pip install selenium

      - name: Create script
        run: |
          cat << "EOF" | tee test.py
          import time
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          chrome_options = Options()
          chrome_options.add_argument("--headless")
          driver = webdriver.Chrome(options=chrome_options)
          driver.get("https://dbree.org/v/381638")
          time.sleep(10)
          print(";".join(f'{d["name"]}={d["value"]}'
                for d in driver.get_cookies()))
          EOF

      - name: Get links
        run: |
          url=${{ inputs.url }}
          num=$(curl -sb "$cookies" "${url%0}" | \
                grep -om1 'Result[^<]*' | cut -d' ' -f6)
          cookies=$(python3 test.py)

          for n in {0..${{ inputs.num }}..10}; do
            mapfile -t ids < <(curl "${url%0}$n" -sb "$cookies" | \
                               grep -o "/[a-z]/[a-z0-9]*")
            for id in "${ids[@]}"; do
              url1=$(curl https://dbree.org"$id" -qsb "$cookies" | \
                     grep -om1 '//dbree.org/d/[/a-z0-9]*')
              url2=$(curl -sb "$cookies" https:"$url1" -w '%{redirect_url}')
              printf "%s\n" "$url2"
              echo url = "$url2" >> urls
            done
          done
          mkdir zip

      - name: Get links
        working-directory: zip
        run: curl -JOZ --remote-name-all -K urls

      - name: List files
        working-directory: zip
        run: ls -Qs1

      - name: Save cache
        uses: actions/cache/save@v3
        with:
          path: zip
          key: ${{ inputs.title }}
          enableCrossOsArchive: true
