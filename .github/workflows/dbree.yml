# git commit -am. && git push -qf && gh workflow run dbree.yml -f title="Nimzo-Semi-Tarrasch-1" -F urls=@dbree-urls -F cookies=@get-cookies.py

name: dbree
run-name: ${{ inputs.title }}
on:
  workflow_dispatch:
    inputs:
      title:
        required: true
      urls:
        required: true
      cookies:
        required: true

jobs:
  main:
    runs-on: ubuntu-latest
    steps:

      - name: Preparing
        run: |
          echo '${{ inputs.cookies }}'
          cat << "EOF" > dbree-urls
          ${{ inputs.urls }}EOF

          cat << "EOF" > get-cookies.py
          ${{ inputs.cookies }}EOF

          sudo snap install ngrok
          ngrok http --authtoken ${{ secrets.NGROK_AUTHTOKEN }} --log ngrok.log file://$PWD &

          sudo add-apt-repository ppa:savoury1/utilities > /dev/null && \
          sudo apt-fast -yqq install curl > /dev/null &

          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache &
          pip install -q selenium
          mkdir zip
          until [[ -f ngrok.log ]]; do sleep 1; done
          cat ngrok.log

      - name: Download
        run: |
          set -x
          echo 'echo "$3" > path.txt' > hook.sh
          cookies=$(python get-cookies.py)
          while read url0; do
              unset url1 url2
              until [[ $url2 == https://www2* ]]; do
                  until [[ -n $url1 ]]; do
                      sleep 1
                      url1=$(curl -qsb $cookies $url0 | grep -om1 "//dbree.org/d/[^']*")
                  done
                  url2=$(curl -qsb $cookies -w '%{redirect_url}' https:$url1)
              done

              aria2c --dir=zip --split=8 --max-connection-per-server=16 --log=download.log --log-level=notice --file-allocation=falloc --show-console-readout=false --summary-interval=10 --disk-cache=1024M --on-download-complete=hook.sh $url2

              read path < path.txt
              size=$(wc -c "$path")
              name=$(basename "$path")
              json=$(jq -c --arg name "$name" --arg size $size '.files[0].fileName=$name|.files[0].fileSize=($size|tonumber)' <<< '{"password":"","files":[{"blob":{"$path":""},"imageData":null,"uploadPercentage":0,"uploadedBytes":0,"chunksArray":[{}],"chunkSize":2147483648,"fileId":-1,"currentChunk":0,"progressNumber":100,"isProcessingFile":false,"sessionId":"4eb9cf79-26e8-021e-a462-20ace549dd7f","totalUploaded":0,"didFinishUploading":false,"fileType":"","chunkProgressArray":[{"totalUploadedOfChunk":0}],"uploadedChunkIndexes":[],"chunkIndexesToUpload":[0],"toBeUploaded":false,"uploading":false,"uploadedBytesArray":[],"currentUploadedBytes":0,"totalChunks":1,"listIndex":1}],"expiryDays":7,"maximumNumberOfDownloads":0,"deferDays":0,"archiveId":313269,"shouldSendReminder":true,"emailReminderCount":2,"snap":false,"max":false}')

              read sid id <<< $(curl https://s1.sendbig.com/api/Files/negotiate --referer https://www.sendbig.com/ --json "$json" | jq -j '"\(.files[0].serverIdentifier) \(.files[0].id)"')

              curl https://"$sid".sendbig.com/api/Files/advancedStreamUpload --referer https://www.sendbig.com/ -F fileName="$name" -F totalChunks=1 -F chunkSize=2147483648 -F fileId=$id -F fileSize=$size -F fileType="" -F archivePassword="" -F sessionId=4eb9cf79-26e8-021e-a462-20ace549dd7f -F uploadedChunkIndexesCSV="" -F currentChunk=0 -F chunkFile=@"$path"

          done < dbree-urls

