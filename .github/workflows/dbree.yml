# git commit -am. && git push -qf && gh workflow run dbree.yml

name: dbree
run-name: Stop-Em-Cold
on: workflow_dispatch
jobs:
  selenium:
    runs-on: ubuntu-latest
    steps:

      - name: Install
        run: pip install selenium

      - name: Create script
        run: |
          cat << "EOF" | tee test.py
          from selenium import webdriver
          driver = webdriver.Chrome()
          driver.get("https://dbree.org/v/381638")
          print(driver.get_cookies())
          EOF

      - name: Run script
        run: python3 test.py

