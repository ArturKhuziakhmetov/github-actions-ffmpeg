# git commit -am. ; git push ; 
# gh workflow run test.yml -F script=@temp/test.sh

name: Test
run-name: Run script
on:
  workflow_dispatch:
    inputs:
      script:
        required: true
jobs:
  script:
    runs-on: ubuntu-latest
    steps:
      - name: Run script
        run: |
          # script
          echo "${{ secrets.RCLONE_CONF }}" | base64 -d > rclone.conf
          ${{ inputs.script }}
