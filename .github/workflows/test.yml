# git commit -am. && git push -qf && gh workflow run test.yml

name: Test
run-name: Test ngrok
on: workflow_dispatch
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Ngrok
        run: |
          sudo snap install ngrok
          mkdir tmp
          ngrok http file:///tmp --authtoken ${{ secrets.NGROK_AUTHTOKEN }} --log ngrok.log &

      - name: Test
        run: |
          echo Test123 > tmp/test.txt
          cat ngrok.log
          while :; do sleep 1; done

