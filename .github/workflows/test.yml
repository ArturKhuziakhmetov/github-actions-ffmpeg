# git commit -am. ; git push ; 
# gh workflow run test.yml -F script=@temp/test.sh

name: Test
run-name: Run script
on:
  workflow_dispatch:
    inputs:
      script:
        required: true
jobs:
  script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/cache/restore@v4
        with:
          key: programs-
          restore-keys: programs-
          path: /home/runner/.local/bin

      - name: Run script
        run: |
          # script
          ${{ inputs.script }}
