# git commit -am. && git push -qf && gh workflow run process.yml

name: Process
run-name: Stop-Em-Cold
on: workflow_dispatch
env:
  title: Stop-Em-Cold
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Install ffmpeg + mkvtoolnix
        run: |
          # Install ffmpeg + mkvtoolnix
          echo ::group::Adding repos
          # sig=/usr/share/keyrings/gpg-pub-moritzbunkus.gpg
          # sudo curl -so $sig https://mkvtoolnix.download/gpg-pub-moritzbunkus.gpg
          # echo deb [signed-by=$sig] https://mkvtoolnix.download/ubuntu jammy main | \
          # sudo tee /etc/apt/sources.list.d/mkvtoolnix.download.list
          # --allow-unauthenticated
          sudo add-apt-repository https://mkvtoolnix.download/ubuntu
          sudo add-apt-repository ppa:savoury1/ffmpeg4
          sudo add-apt-repository ppa:savoury1/ffmpeg5
          echo ::endgroup::
          echo ::group::Installing
          sudo apt-fast -qq --allow-unauthenticated update
          sudo apt-fast -qq install mkvtoolnix ffmpeg
          echo ::endgroup::

      - name: Versions
        run: mkvmerge -V; ffmpeg -version

      - name: Restore cached input
        uses: actions/cache/restore@v3
        with:
          path: input
          key: ${{ env.title }}-input
          fail-on-cache-miss: true

      - name: Make dirs
        run: mkdir -p output/info tmp

      - name: Preset
        working-directory: input
        run: |
          cat << "EOF" | tee preset
          vcodec=libx264
          preset=veryfast
          tune=animation
          x264opts=no-scenecut
          crf=25
          g=1800
          threads=1
          acodec=libopus
          ab=16k
          apply_phase_inv=0
          frame_duration=60
          application=voip
          cutoff=12000
          EOF

      - name: ffmpeg
        working-directory: input
        run: |
          for file in *.mp4; do
            echo ::group::"$file"
            duration=$(ffprobe -v 24 -show_entries format=duration -of csv=p=0 "$file")

            ss=5
            to=$(jq -n $duration-7)
            trim=7:$(jq -n $duration-9)
            crop=880:880:1040:0
            fps=fps=source_fps:start_time=0:eof_action=pass
            # scale=536:536:flags=sinc
            # t=30

            FFREPORT=file=%p-%t.log:level=32 \
            ffmpeg -y -hide_banner -nostdin -nostats -benchmark -i "$file" \
            -ss $ss -to $to ${t+-t $t}\
            -vf trim=$trim,crop=$crop,${scale+scale=$scale,}fps=$fps \
            -ac 1 -fpre preset \
            "../tmp/$(basename "$file" .mp4).mkv"

            echo ::endgroup::
          done

      - name: mkvmerge
        working-directory: tmp
        run: |
          for file in *.mkv; do
            echo ::group::"$file"
            mkvmerge "$file" -o "../output/$file"
            echo ::endgroup::
          done

      - name: Archive logs
        working-directory: input
        run: tar cJvvf ../output/info/logs.txz *.log

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ${{ env.title }}
          path: output
          retention-days: 1
