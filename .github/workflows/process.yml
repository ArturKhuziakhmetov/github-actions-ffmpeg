name: Plichta French transcoding
run-name: Test 30s
on: workflow_dispatch
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Install ffmpeg
        run: |
          # Install ffmpeg
          sudo add-apt-repository ppa:savoury1/ffmpeg4
          sudo add-apt-repository ppa:savoury1/ffmpeg5
          sudo fast-apt update -y
          sudo fast-apt install -y ffmpeg

      - name: FFmpeg version
        run: |
          ffmpeg -version

      - name: Restore cache
        uses: actions/cache/restore@v3
        with:
          path: input
          key: 3f1836af-8589-3da4-eea4-8b7a06f9d6ae
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Preset
        run: |
          cat << "EOF" | tee preset
          vcodec=libx264
          preset=veryfast
          tune=animation
          x264opts=no-scenecut
          crf=25
          g=1439
          acodec=libopus
          ab=16k
          apply_phase_inv=0
          frame_duration=60
          application=voip
          cutoff=12000
          EOF

      - name: Transcoding
        run: |
          for file in input/*; do
          echo "::group::$file"
          silence_start=$(ffmpeg -v 24 -vn -i "$file" -af silencedetect=d=4:n=1e-3,ametadata=mode=print:file=- -f null - | tail -1 | cut -c21-)
          FFREPORT=file=%p-%t.log:level=32 \
          ffmpeg -hide_banner -nostdin -nostats -benchmark -i "$file" -ss 5 -t 30 -vf trim=6:$(jq -n $silence_start-1),crop=896:896:1024:0,fps=fps=source_fps:start_time=0:eof_action=pass -ac 1 -fpre preset "${file##*/}"
          echo "::endgroup::"
          done

      - name: Upload output artifact
        uses: actions/upload-artifact@v3
        with:
          name: output
          path: |
            *.mkv
            *.log

