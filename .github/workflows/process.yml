# git commit -am. && git push -qf && gh workflow run process.yml -f title='Lifetime Repertoires - Wesley So_s 1. e4 (Part 1)' -f id=2203e3a3-a3c8-bb77-9ba7-ed7953c8113c

name: Process
run-name: Lifetime Repertoires - Wesley So_s 1. e4 (Part 1)
on:
  workflow_dispatch:
    inputs:
      title:
        required: true
      id:
        required: true
jobs:
  main:
    runs-on: ubuntu-latest
    steps:

      - name: Install
        run: |
          sudo add-apt-repository https://mkvtoolnix.download/ubuntu && \
          sudo add-apt-repository ppa:savoury1/ffmpeg4 && \
          sudo add-apt-repository ppa:savoury1/ffmpeg5 && \
          sudo apt-fast -yqq --allow-insecure-repositories update && \
          sudo apt-fast -yqq --allow-unauthenticated install mkvtoolnix ffmpeg &

      - name: Make dirs
        run: mkdir -p output/info tmp

      - name: Download
        run: |
          # curl -qZJ --remote-name-all \
          aria2c --split=1 --max-connection-per-server=16 --max-concurrent-downloads=100 --file-allocation=none --show-console-readout=false --console-log-level=warn --summary-interval=0 --disk-cache=1024M \
          $(curl -qsS --referer https://www.sendbig.com \
          -H 'Content-Type: application/json' \
          -d '{identifier:"${{ inputs.id }}"}' \
          https://s1.sendbig.com/api/Archive/viewArchive | \
          jq -j '.data.files | sort_by(.fileSize) | reverse[] |
          "https://\(.serverIdentifier).sendbig.com/api/Files/download/\(.id)/${{ inputs.id }}/20138 "')

      # - name: Extract
      #   run: unrar e -v *.001

      - name: List files
        run: tree -sF

      - name: Preset
        run: |
          cat << "EOF" | tee preset
          vcodec=libx264
          preset=veryfast
          tune=animation
          x264opts=no-scenecut
          crf=23
          g=1800
          threads=1
          acodec=libopus
          ab=16k
          apply_phase_inv=0
          frame_duration=60
          application=voip
          cutoff=12000
          EOF

      - name: Versions
        run: |
          until type mkvmerge ffmpeg &> /dev/null; do sleep 1; done
          mkvmerge -V; ffmpeg -version

      - name: ffmpeg
        run: |
          for file in *.mp4; do
            echo ::group::"$file"
            duration=$(ffprobe -v 24 -show_entries format=duration -of csv=p=0 "$file")

            ss=5
            to=$(jq -n $duration-7)
            trim=7:$(jq -n $duration-9)
            crop=400:480:316:0
            fps=fps=source_fps:start_time=0:eof_action=pass
            # scale=536:536:flags=sinc
            extra=,setdar=1
            # t=20

            FFREPORT=file=%p-%t.log:level=32 \
            ffmpeg -y -hide_banner -nostdin -nostats -benchmark -i "$file" \
            -ss $ss -to $to ${t+-t $t}\
            -vf trim=$trim,crop=$crop,${scale+scale=$scale,}fps=$fps$extra \
            -ac 1 -fpre preset \
            "tmp/${file%.*}.mkv"

            echo ::endgroup::
          done

      - name: mkvmerge
        working-directory: tmp
        run: |
          for file in *.mkv; do
            echo ::group::"$file"
            mkvmerge "$file" -o "../output/$file"
            echo ::endgroup::
          done

      - name: Archive logs
        run: tar cJvvf output/info/logs.txz *.log

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ${{ inputs.title }}
          path: output
          retention-days: 1
