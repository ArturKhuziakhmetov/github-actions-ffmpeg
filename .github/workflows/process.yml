name: Fight 1.e4 like Caruana - PROCESS
run-name: Full process
on: workflow_dispatch
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Install ffmpeg + mkvtoolnix
        run: |
          # Install ffmpeg + mkvtoolnix
          sig=/usr/share/keyrings/gpg-pub-moritzbunkus.gpg
          sudo curl -so $sig https://mkvtoolnix.download/gpg-pub-moritzbunkus.gpg
          echo deb [signed-by=$sig] https://mkvtoolnix.download/ubuntu jammy main | \
          sudo tee /etc/apt/sources.list.d/mkvtoolnix.download.list
          sudo add-apt-repository ppa:savoury1/ffmpeg4
          sudo add-apt-repository ppa:savoury1/ffmpeg5
          sudo apt-fast update -y
          sudo apt-fast install -y mkvtoolnix ffmpeg

      - name: Versions
        run: mkvmerge -V; ffmpeg -version

      - name: Restore cache
        uses: actions/cache/restore@v3
        with:
          path: input
          key: be2f142e-6380-9601-0eff-b44f8fd99aea
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Preset
        working-directory: input
        run: |
          cat << "EOF" | tee preset
          vcodec=libx264
          preset=veryfast
          tune=animation
          x264opts=no-scenecut
          crf=23
          g=1500
          threads=1
          acodec=libopus
          ab=16k
          apply_phase_inv=0
          frame_duration=60
          application=voip
          cutoff=12000
          EOF

      - name: Make dirs
        run: mkdir output tmp

      - name: ffmpeg
        working-directory: input
        run: |
          for file in *.mp4; do
          echo ::group::"$file"

          duration=$(ffprobe -v 24 -show_entries format=duration -of csv=p=0 "$file")

          FFREPORT=file=%p-%t.log:level=32 \
          ffmpeg -y -hide_banner -nostdin -nostats -benchmark -i "$file" \
          -ss 11 -to $(jq -n $duration-11) -vf \
          trim=13:$(jq -n $duration-13),crop=544:540:416:0,fps=fps=25:start_time=0:eof_action=pass \
          -ac 1 -fpre preset "../tmp/$(basename "$file" .mp4).mkv"

          echo ::endgroup::
          done

      - name: mkvmerge
        working-directory: tmp
        run: |
          for file in *.mkv; do
          mkvmerge "$file" -o "../output/$file"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: output
          path: |
            output
            input/*.log
          retention-days: 5

# git commit -am. && git push -qf && gh workflow run process.yml
